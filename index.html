    <meta charset="UTF-8">

        <!-- iOS添加到主屏幕图标设置 -->
  <link rel="apple-touch-icon" href="img/QQ.png">
  <link rel="apple-touch-icon-precomposed" href="img/QQ.png">
  <meta name="apple-mobile-web-app-title" content="QQ">
    <link rel="stylesheet" href="style.css">
    <!-- 内联样式：等级图标容器 -->
    <style>
        /* 等级图标容器样式 */
        .qq-level-icons {
            display: inline-flex !important;
            align-items: center !important;
            height: 16px !important;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 0 !important;
            white-space: nowrap !important;
        }

        .qq-level-icons img {
            height: 16px !important;
            width: 16px !important;
            display: inline-block !important;
            padding: 0 !important;
            border: none !important;
            vertical-align: middle !important;
        }

        /* 确保包装元素的间距 */
        .qq-level-icons span {
            margin-right: 3px !important;
            display: inline-block !important;
            font-size: 0 !important;
        }

        /* 修复图标间距样式 - 与handoff.css完全一致 */
        .box7 .box7_right {
            display: flex;
            align-items: center;
            justify-content: flex-start !important;
            gap: 0;
            /* 移除间距 */
        }
        
        .box7 .box7_right img {
            height: 1rem;
            margin-right: 0.5rem;
        }
        
        /* 会员图标区域 - 统一尺寸为32x32像素 */
        .box8 .box7_right {
            gap: 0.25rem; /* 使用gap来控制间距 */
        }
        
        .box8 .box7_right img {
            width: 2rem;
            height: 2rem;
            margin-right: 0; /* 移除margin-right */
            object-fit: contain;
        }
        
        /* 灰色图标缩小 */
        .box8 .box7_right img[src*="/box7_right/"] {
            width: 1.5rem;
            height: 1.5rem;
        }
        
        /* 最后一个图标保持较小尺寸 - 统一为16x16像素，无右边距 */
        .box8 .box7_right img:last-child {
            width: 1rem;
            height: 1rem;
        }
        
        /* 确保box7_right内的其他元素间距正常，但不影响会员图标 */
        .box7 .box7_right>*:not(.level-container):not(img) {
            margin-right: 0.5rem !important;
        }

        /* 动态图标选择器布局 */
        .dynamic-icon-selector {
            display: flex;
            flex-wrap: nowrap;
            /* Prevent wrapping */
            overflow-x: auto;
            /* Enable horizontal scrolling */
            gap: 10px;
            margin-top: 10px;
            padding-bottom: 10px;
            /* Add some padding for scrollbar */
        }

        .dynamic-icon-selector label {
            display: block;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 5px;
        }

        .dynamic-icon-selector input[type="radio"]:checked+label {
            border-color: #12b7f5;
            /* Highlight selected icon */
        }

        .dynamic-icon-selector img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .box8 .box7_right {
            overflow-x: hidden;
            white-space: nowrap;
        }

        /* 拖拽图标样式 */
        .draggable-icon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            margin: 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #f9f9f9;
            user-select: none;
        }

        .draggable-icon.selected {
            border-color: #4CAF50;
            background-color: #e8f5e8;
        }

        .draggable-icon.unselected {
            border-color: #ccc;
            background-color: #f0f0f0;
            opacity: 0.6;
        }

        .draggable-icon:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .draggable-icon span {
            font-size: 12px;
            font-weight: bold;
        }

        .draggable-icon small {
            color: #666;
            font-size: 10px;
            display: block;
        }

        .draggable-icon img {
            pointer-events: none;
        }

        .icon-group {
            margin: 8px 0;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 8px;
            background-color: #fafafa;
        }

        .icon-versions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }



        /* VIP Icon Customizer Styles */
        #vip-icon-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
            padding: 5px;
            border: 1px solid #eee;
            border-radius: 5px;
            max-height: 150px;
            overflow-y: auto;
        }

        .vip-icon-checkbox-label {
            display: inline-block;
            border: 2px solid #ccc;
            border-radius: 4px;
            padding: 4px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .vip-icon-checkbox-label img {
            width: 32px;
            height: 32px;
            vertical-align: middle;
        }

        .vip-icon-checkbox-label input {
            display: none;
        }

        .vip-icon-checkbox-label.checked {
            border-color: #12b7f5;
        }


        /* 大V图标选择器样式 */
        .vip-badges-selector {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .vip-badge-option {
            position: relative;
            flex: 0 0 auto;
        }

        .vip-badge-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .vip-badge-option label {
            display: block;
            padding: 5px;
            border: 2px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .vip-badge-option input[type="radio"]:checked+label {
            border-color: #12b7f5;
            background-color: rgba(18, 183, 245, 0.1);
        }

        #age:not(:empty)::after {
            content: "岁";
        }
    </style>
</head>

                versions: {} // 全部使用灰色版本

                icons: ['vip-icon-1', 'vip-icon-2', 'vip-icon-10', 'vip-icon-11', 'vip-icon-12', 'vip-icon-13', 'vip-icon-14', 'vip-icon-15'],

                    'vip-icon-12': 'color',
                    'vip-icon-13': 'color',

                    'vip-icon-15': 'color'

        /**

            loadUserData();

            initEventListeners();

        /**
         * 初始化所有事件监听器
         */

            // VIP图标选择事件
            initVipIconCustomizationEvents();

            // 等级图标样式选择事件

            initEditFormEvents();

            initEnergyIconSelectionEvents();

            initAreaVisibilityEvents();

            initEditProfileButtonEvents();

        /**
         * 初始化会员图标自定义功能
         */
        function initVipIconCustomizationEvents() {
            // 初始化默认状态
            resetToDefaultDisplay();
            
            // 渲染可拖拽的图标列表
            renderIconOrderList();
            
            // 显示模式切换事件
            document.getElementById('vipIconDisplayMode').addEventListener('change', (e) => {
                const wasCustom = vipIconState.isCustom;
                vipIconState.displayMode = e.target.value;
                
                if (!wasCustom) {
                    // 如果不是自定义模式，重置为对应模式的默认配置
                    resetToDefaultDisplay();
                    renderIconOrderList();
                }
                updateVipIconsDisplay();
            });

            // 全选按钮
            document.getElementById('vipIconSelectAll').addEventListener('click', () => {
                vipIconState.isCustom = true;
                if (vipIconState.displayMode === 'gray') {
                    // 灰色模式下只选择有灰色版本的图标
                    vipIconState.selectedIcons = vipIconsConfig
                        .filter(icon => icon.graySrc)
                        .map(icon => icon.id);
                } else {
                    // 其他模式选择所有图标
                    vipIconState.selectedIcons = vipIconsConfig.map(icon => icon.id);
                }
                renderIconOrderList();
                updateVipIconsDisplay();
            });

            // 全不选按钮
            document.getElementById('vipIconDeselectAll').addEventListener('click', () => {
                vipIconState.isCustom = true;
                vipIconState.selectedIcons = [];
                renderIconOrderList();
                updateVipIconsDisplay();
            });

            // 恢复默认按钮
            document.getElementById('resetToDefault').addEventListener('click', () => {
                resetToDefaultDisplay();
                renderIconOrderList();
                updateVipIconsDisplay();
            });
        }

        /**
         * 重置到默认显示状态
         */
        function resetToDefaultDisplay() {
            vipIconState.isCustom = false;
            const config = defaultDisplayConfig[vipIconState.displayMode];
            vipIconState.selectedIcons = [...config.icons];
            vipIconState.selectedIconVersions = {...config.versions};
        }

        /**
         * 渲染可拖拽的图标列表
         */
        function renderIconOrderList() {
            const container = document.getElementById('vip-icon-order-list');
            const displayMode = vipIconState.displayMode;
            
            if (displayMode === 'mixed') {
                // 混合模式：先显示所有彩色图标，再显示所有灰色图标
                const colorIcons = [];
                const grayIcons = [];
                
                vipIconsConfig.forEach(icon => {
                    const isSelected = vipIconState.selectedIcons.includes(icon.id);
                    const versions = vipIconState.selectedIconVersions[icon.id] || [];
                    const versionsArray = Array.isArray(versions) ? versions : [versions].filter(v => v);
                    const colorSelected = isSelected && versionsArray.includes('color');
                    const graySelected = isSelected && versionsArray.includes('gray');
                    
                    // 彩色图标
                    colorIcons.push(`
                        <div class="draggable-icon ${colorSelected ? 'selected' : 'unselected'}" 
                             data-icon-id="${icon.id}" 
                             data-version="color"
                             draggable="true">
                            <img src="${icon.colorSrc}" alt="${icon.name}" style="width: 32px; height: 32px; object-fit: contain;">
                            <span>${icon.name}(彩)</span>
                            ${icon.category === 'main' ? '<small>(大会员图标组)</small>' : icon.category === 'member' ? '<small>(会员图标组)</small>' : icon.category === 'yellow_diamond' ? '<small>(黄钻图标组)</small>' : ''}
                        </div>
                    `);
                    
                    // 灰色图标（只有存在灰色版本的才添加）
                    if (icon.graySrc) {
                        grayIcons.push(`
                            <div class="draggable-icon ${graySelected ? 'selected' : 'unselected'}" 
                                 data-icon-id="${icon.id}" 
                                 data-version="gray"
                                 draggable="true">
                                <img src="${icon.graySrc}" alt="${icon.name}" style="width: 32px; height: 32px; object-fit: contain;">
                                <span>${icon.name}(灰)</span>
                                ${icon.category === 'main' ? '<small>(大会员图标组)</small>' : icon.category === 'member' ? '<small>(会员图标组)</small>' : icon.category === 'yellow_diamond' ? '<small>(黄钻图标组)</small>' : ''}
                            </div>
                        `);
                    }
                });
                
                // 先显示彩色图标，再显示灰色图标
                container.innerHTML = `
                    <div class="color-section">
                        <h4 style="margin: 10px 0; color: #666;">彩色图标</h4>
                        ${colorIcons.join('')}
                    </div>
                    <div class="gray-section">
                        <h4 style="margin: 10px 0; color: #666;">灰色图标</h4>
                        ${grayIcons.join('')}
                    </div>
                `;
            } else {
                // 单色模式：原有逻辑
                const allIcons = vipIconsConfig.map(icon => {
                    const isSelected = vipIconState.selectedIcons.includes(icon.id);
                    
                    // 如果是灰色模式但没有灰色版本，则不显示该图标
                    if (displayMode === 'gray' && !icon.graySrc) {
                        return '';
                    }
                    
                    const src = (displayMode === 'gray' && icon.graySrc) ? icon.graySrc : icon.colorSrc;
                    
                    return `
                        <div class="draggable-icon ${isSelected ? 'selected' : 'unselected'}" 
                             data-icon-id="${icon.id}" 
                             data-version="${displayMode}"
                             draggable="true">
                            <img src="${src}" alt="${icon.name}" style="width: 32px; height: 32px; object-fit: contain;">
                            <span>${icon.name}</span>
                            ${icon.category === 'main' ? '<small>(大会员图标组)</small>' : icon.category === 'member' ? '<small>(会员图标组)</small>' : icon.category === 'yellow_diamond' ? '<small>(黄钻图标组)</small>' : ''}
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = allIcons;
            }
            
            // 添加拖拽和点击事件
            addDragAndClickEvents(container);
        }

        /**
         * 添加拖拽和点击事件
         */
        function addDragAndClickEvents(container) {
            const draggableItems = container.querySelectorAll('.draggable-icon');
            let draggedElement = null;

            draggableItems.forEach(item => {
                // 点击切换选中状态
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const iconId = item.dataset.iconId;
                    const version = item.dataset.version;
                    toggleIconSelection(iconId, version);
                });

                // 拖拽开始
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    e.dataTransfer.effectAllowed = 'move';
                    item.style.opacity = '0.5';
                });

                // 拖拽结束
                item.addEventListener('dragend', (e) => {
                    item.style.opacity = '1';
                    draggedElement = null;
                });

                // 拖拽进入
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                // 拖拽放置
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedElement && draggedElement !== item) {
                        reorderIcons(draggedElement.dataset.iconId, item.dataset.iconId);
                    }
                });
            });
        }

        /**
         * 按照正确的顺序插入图标ID到选中列表中
         */
        function insertIconInOrder(iconId) {
            const currentIcon = vipIconsConfig.find(icon => icon.id === iconId);
            if (!currentIcon) return;
            
            // 定义类别优先级
            const categoryPriority = {
                'main': 1,
                'member': 2,
                'yellow_diamond': 3,
                'decoration': 4
            };
            
            // 如果是灰色模式，按灰色文件序号排序
            if (vipIconState.displayMode === 'gray') {
                function getGrayFileNumber(icon) {
                    if (!icon.graySrc) return 999;
                    const match = icon.graySrc.match(/(\d+)\.png$/);
                    return match ? parseInt(match[1]) : 999;
                }
                
                const currentGrayNum = getGrayFileNumber(currentIcon);
                let insertIndex = vipIconState.selectedIcons.length;
                
                for (let i = 0; i < vipIconState.selectedIcons.length; i++) {
                    const existingIcon = vipIconsConfig.find(icon => icon.id === vipIconState.selectedIcons[i]);
                    if (existingIcon && getGrayFileNumber(existingIcon) > currentGrayNum) {
                        insertIndex = i;
                        break;
                    }
                }
                
                vipIconState.selectedIcons.splice(insertIndex, 0, iconId);
            } else {
                // 彩色模式和混合模式，按类别优先级排序
                const currentPriority = categoryPriority[currentIcon.category] || 999;
                const currentConfigIndex = vipIconsConfig.findIndex(cfg => cfg.id === iconId);
                let insertIndex = vipIconState.selectedIcons.length;
                
                for (let i = 0; i < vipIconState.selectedIcons.length; i++) {
                    const existingIcon = vipIconsConfig.find(icon => icon.id === vipIconState.selectedIcons[i]);
                    if (!existingIcon) continue;
                    
                    const existingPriority = categoryPriority[existingIcon.category] || 999;
                    const existingConfigIndex = vipIconsConfig.findIndex(cfg => cfg.id === vipIconState.selectedIcons[i]);
                    
                    // 如果当前图标优先级更高，插入到这里
                    if (currentPriority < existingPriority) {
                        insertIndex = i;
                        break;
                    }
                    // 如果优先级相同，按配置文件中的顺序
                    else if (currentPriority === existingPriority && currentConfigIndex < existingConfigIndex) {
                        insertIndex = i;
                        break;
                    }
                }
                
                vipIconState.selectedIcons.splice(insertIndex, 0, iconId);
            }
        }

        /**
         * 切换图标选中状态
         */
        function toggleIconSelection(iconId, version = null) {
            const currentIcon = vipIconsConfig.find(icon => icon.id === iconId);
            vipIconState.isCustom = true;
            
            if (vipIconState.displayMode === 'mixed' && version) {
                // 混合模式：支持同时选择彩色和灰色版本，但有类别限制
                const existingVersions = vipIconState.selectedIconVersions[iconId] || [];
                
                // 如果selectedIconVersions存储的是字符串，转换为数组
                const versions = Array.isArray(existingVersions) ? existingVersions : [existingVersions].filter(v => v);
                
                if (versions.includes(version)) {
                    // 如果已选中这个版本，则移除
                    const updatedVersions = versions.filter(v => v !== version);
                    
                    if (updatedVersions.length === 0) {
                        // 如果没有选中的版本了，移除整个图标
                        const index = vipIconState.selectedIcons.indexOf(iconId);
                        if (index > -1) {
                            vipIconState.selectedIcons.splice(index, 1);
                        }
                        delete vipIconState.selectedIconVersions[iconId];
                    } else {
                        // 更新版本数组
                        vipIconState.selectedIconVersions[iconId] = updatedVersions;
                    }
                } else {
                    // 添加这个版本 - 检查类别限制（仅对彩色版本）
                    if (version === 'color' && (currentIcon.category === 'main' || currentIcon.category === 'member' || currentIcon.category === 'yellow_diamond')) {
                        // 移除同类别的其他已选中图标的彩色版本
                        const iconsToUpdate = vipIconState.selectedIcons.filter(selectedId => {
                            const selectedIcon = vipIconsConfig.find(icon => icon.id === selectedId);
                            return selectedIcon && selectedIcon.category === currentIcon.category && selectedId !== iconId;
                        });
                        
                        iconsToUpdate.forEach(updateId => {
                            const existingVersionsForUpdate = vipIconState.selectedIconVersions[updateId] || [];
                            const versionsArrayForUpdate = Array.isArray(existingVersionsForUpdate) ? existingVersionsForUpdate : [existingVersionsForUpdate].filter(v => v);
                            
                            // 移除彩色版本，保留灰色版本
                            const updatedVersionsForUpdate = versionsArrayForUpdate.filter(v => v !== 'color');
                            
                            if (updatedVersionsForUpdate.length === 0) {
                                // 如果没有版本了，移除整个图标
                                const removeIndex = vipIconState.selectedIcons.indexOf(updateId);
                                if (removeIndex > -1) {
                                    vipIconState.selectedIcons.splice(removeIndex, 1);
                                }
                                delete vipIconState.selectedIconVersions[updateId];
                            } else {
                                // 更新版本数组
                                vipIconState.selectedIconVersions[updateId] = updatedVersionsForUpdate;
                            }
                        });
                    }
                    
                    // 添加当前图标
                    if (!vipIconState.selectedIcons.includes(iconId)) {
                        insertIconInOrder(iconId);
                    }
                    vipIconState.selectedIconVersions[iconId] = [...versions, version];
                }
            } else {
                // 单色模式：原有逻辑
                const index = vipIconState.selectedIcons.indexOf(iconId);
                if (index > -1) {
                    // 如果已选中，则移除
                    vipIconState.selectedIcons.splice(index, 1);
                    delete vipIconState.selectedIconVersions[iconId];
                } else {
                    // 检查类别限制
                    if (currentIcon.category === 'main' || currentIcon.category === 'member' || currentIcon.category === 'yellow_diamond') {
                        // 移除同类别的其他已选中图标
                        const iconsToRemove = vipIconState.selectedIcons.filter(selectedId => {
                            const selectedIcon = vipIconsConfig.find(icon => icon.id === selectedId);
                            return selectedIcon && selectedIcon.category === currentIcon.category;
                        });
                        
                        iconsToRemove.forEach(removeId => {
                            const removeIndex = vipIconState.selectedIcons.indexOf(removeId);
                            if (removeIndex > -1) {
                                vipIconState.selectedIcons.splice(removeIndex, 1);
                            }
                            delete vipIconState.selectedIconVersions[removeId];
                        });
                    }
                    
                    // 如果未选中，则按顺序插入
                    insertIconInOrder(iconId);
                    vipIconState.selectedIconVersions[iconId] = vipIconState.displayMode;
                }
            }
            
            renderIconOrderList();
            updateVipIconsDisplay();
        }

        /**
         * 重新排序图标
         */
        function reorderIcons(draggedId, targetId) {
            vipIconState.isCustom = true;
            const draggedIndex = vipIconState.selectedIcons.indexOf(draggedId);
            const targetIndex = vipIconState.selectedIcons.indexOf(targetId);
            
            if (draggedIndex > -1 && targetIndex > -1) {
                // 两个都在选中列表中，交换位置
                [vipIconState.selectedIcons[draggedIndex], vipIconState.selectedIcons[targetIndex]] = 
                [vipIconState.selectedIcons[targetIndex], vipIconState.selectedIcons[draggedIndex]];
            } else if (draggedIndex > -1) {
                // 拖拽的在选中列表中，目标不在，移除拖拽的
                vipIconState.selectedIcons.splice(draggedIndex, 1);
            } else if (targetIndex > -1) {
                // 目标在选中列表中，拖拽的不在，在目标位置插入拖拽的
                vipIconState.selectedIcons.splice(targetIndex, 0, draggedId);
            }
            
            renderIconOrderList();
            updateVipIconsDisplay();
        }

        /**
         * 更新会员图标显示
         */
        function updateVipIconsDisplay() {
            const selectedIcons = vipIconState.selectedIcons;
            const selectedVersions = vipIconState.selectedIconVersions;
            const box8Container = document.querySelector('.box.box8');

            // 控制整个容器的显示/隐藏
            if (box8Container) {
                if (selectedIcons.length === 0) {
                    box8Container.style.display = 'none';
                } else {
                    box8Container.style.display = 'flex';
                }
            }

            // 首先隐藏所有图标
            vipIconsConfig.forEach(icon => {
                const imgElement = document.getElementById(icon.id);
                if (imgElement) {
                    imgElement.style.display = 'none';
                }
            });

            // 清理之前创建的克隆元素
            const existingClones = document.querySelectorAll('[id^="vip-icon-"][id*="-clone"]');
            existingClones.forEach(clone => clone.remove());

            // 创建要显示的图标列表，支持混合模式下的多版本
            const iconsToDisplay = [];
            
            selectedIcons.forEach(iconId => {
                const icon = vipIconsConfig.find(cfg => cfg.id === iconId);
                if (!icon) return;
                
                const versions = selectedVersions[iconId];
                
                if (vipIconState.displayMode === 'mixed' && Array.isArray(versions) && versions.length > 0) {
                    // 混合模式下，每个版本都作为独立的显示项
                    versions.forEach(version => {
                        // 如果是灰色版本但没有灰色图标，跳过
                        if (version === 'gray' && !icon.graySrc) return;
                        iconsToDisplay.push({ iconId, version, originalOrder: selectedIcons.indexOf(iconId) });
                    });
                } else {
                    // 单色模式
                    const version = Array.isArray(versions) ? versions[0] : (versions || vipIconState.displayMode);
                    // 如果是灰色模式但没有灰色版本，跳过该图标
                    if (version === 'gray' && !icon.graySrc) return;
                    iconsToDisplay.push({ iconId, version, originalOrder: selectedIcons.indexOf(iconId) });
                }
            });

            // 按彩色优先排序：color版本排在gray版本前面
            iconsToDisplay.sort((a, b) => {
                // 首先按版本排序：color < gray
                if (a.version === 'color' && b.version === 'gray') return -1;
                if (a.version === 'gray' && b.version === 'color') return 1;
                
                // 获取图标配置信息
                const aIcon = vipIconsConfig.find(cfg => cfg.id === a.iconId);
                const bIcon = vipIconsConfig.find(cfg => cfg.id === b.iconId);
                
                // 大会员图标（main类别）优先级最高
                const aIsMain = aIcon && aIcon.category === 'main';
                const bIsMain = bIcon && bIcon.category === 'main';
                
                if (aIsMain && !bIsMain) return -1;
                if (!aIsMain && bIsMain) return 1;
                
                // 相同版本按原始选中顺序排序
                return a.originalOrder - b.originalOrder;
            });
            
            // 获取容器，准备重新排列元素
            const container = document.querySelector('.box8 .box7_right');
            if (!container) return;
            
            // 收集所有需要显示的元素
            const elementsToShow = [];
            
            iconsToDisplay.forEach((item, index) => {
                const icon = vipIconsConfig.find(cfg => cfg.id === item.iconId);
                if (!icon) return;

                let imgElement = document.getElementById(item.iconId);
                
                // 为额外的版本创建克隆元素
                if (index > 0 && iconsToDisplay.findIndex(x => x.iconId === item.iconId) < index) {
                    // 这是同一图标的额外版本，创建克隆
                    const cloneId = `${item.iconId}-clone-${item.version}-${index}`;
                    let cloneElement = document.getElementById(cloneId);
                    
                    if (!cloneElement) {
                        cloneElement = imgElement.cloneNode(true);
                        cloneElement.id = cloneId;
                    }
                    imgElement = cloneElement;
                }
                
                if (!imgElement) return;

                // 设置图标源
                let src = icon.colorSrc;
                if (item.version === 'gray' && icon.graySrc) {
                    src = icon.graySrc;
                }
                
                imgElement.src = src;
                imgElement.style.display = 'inline-block';
                
                elementsToShow.push(imgElement);
            });
            
            // 重新排列容器中的元素顺序
            elementsToShow.forEach(element => {
                container.appendChild(element);
            });
        }

                // 当前在 index.html，切换到 handoff.html
                window.location.href = './handoff.html';
            } else if (currentPage.includes('handoff.html')) {

            if (styleRadio) styleRadio.checked = true;

            // 选择正确的动态图标
            const dynamicIconRadio = document.querySelector(`input[name="dynamicIconSelect"][value="${userData.selectedDynamicIcon}"]`);
            if (dynamicIconRadio) dynamicIconRadio.checked = true;

            // 选择正确的VIP图片
            const vipImageRadio = document.getElementById(`${userData.selectedImage}Radio`);
            if (vipImageRadio) vipImageRadio.checked = true;

            // 设置会员图标自定义表单
            document.getElementById('vipIconDisplayMode').value = vipIconState.displayMode;
            document.querySelectorAll('#vip-icon-checkboxes input[type="checkbox"]').forEach(cb => {
                const iconId = cb.dataset.iconId;
                const isVisible = vipIconState.visible.includes(iconId);
                cb.checked = isVisible;
                if (isVisible) {
                    cb.parentElement.classList.add('checked');
                } else {
                    cb.parentElement.classList.remove('checked');
                }
            });

            // 设置已选择的大V图标状态
            setVipBadgeCheckboxes();

            // 选择正确的能量值图标
            const energyIconRadio = document.querySelector(`input[name="energyIconSelect"][value="${userData.selectedEnergyIcon}"]`);
            if (energyIconRadio) energyIconRadio.checked = true;

            // 设置等级区域显示复选框状态
            const showBox7Checkbox = document.getElementById('showBox7');
            if (showBox7Checkbox) showBox7Checkbox.checked = userData.showBox7;
        }

        /**
         * 处理表单提交
         */
        function handleFormSubmit(event) {
            event.preventDefault();

            const formData = {
                avatarInput: document.getElementById("avatarInput"),
                nameInput: document.getElementById("nameInput"),
                goodInput: document.getElementById("goodInput"),
                qqNumberInput: document.getElementById("qqNumberInput"),
                genderInput: document.getElementById("genderInput"),
                ageInput: document.getElementById("ageInput"),
                provinceInput: document.getElementById("provinceInput"),
                cityInput: document.getElementById("cityInput"),
                personalSignInput: document.getElementById("personalSignInput"),
                levelInput: document.getElementById("levelInput")
            };

            // 处理头像上传
            if (formData.avatarInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const avatar = e.target.result;
                    // 移除localStorage存储
                    document.getElementById("avatar").src = avatar;
                };
                reader.readAsDataURL(formData.avatarInput.files[0]);
            }

            // 处理故事图片上传
            let hasStories = false;
            for (let i = 1; i <= 4; i++) {
                const input = document.getElementById(`storyImageInput${i}`);
                if (input && input.files.length > 0) {
                    hasStories = true;
                    const reader = new FileReader();
                    const imageId = `storyImage${i}`;
                    reader.onload = (e) => {
                        const imageData = e.target.result;
                        // 移除localStorage存储
                        const imgElement = document.getElementById(imageId);
                        if (imgElement) {
                            imgElement.src = imageData;
                            imgElement.parentElement.classList.add('has-image');
                        }
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            }

            // 如果有故事图片，显示整个容器
            const storyContainer = document.querySelector('.story-container');
            if (storyContainer) {
                if (hasStories) {
                    storyContainer.classList.add('has-stories');
                } else {
                    storyContainer.classList.remove('has-stories');
                }
            }

            // 保存文本数据
            const userData = {
                name: formData.nameInput.value,
                good: formData.goodInput.value,
                qqNumber: formData.qqNumberInput.value,
                gender: formData.genderInput.value,
                age: formData.ageInput.value,
                province: formData.provinceInput.value,
                city: formData.cityInput.value,
                personalSign: formData.personalSignInput.value
            };

            // 不再保存到localStorage，直接更新页面显示
            document.getElementById("name").textContent = userData.name;
            document.getElementById("good").textContent = userData.good;
            document.getElementById("qq_number").textContent = userData.qqNumber;
            document.getElementById("gender").textContent = userData.gender || "";
            document.getElementById("age").textContent = userData.age || "";
            document.getElementById("province").textContent = userData.province || "";
            document.getElementById("city").textContent = userData.city || "";
            updatePersonalSignDisplay(userData.personalSign);

            // 处理QQ等级和图标样式
            const level = formData.levelInput.value;
            const selectedStyle = document.querySelector('input[name="levelIconStyle"]:checked').value;

            if (level) {
                const levelNum = parseInt(level);
                updateLevelIcons(levelNum, selectedStyle);
                // 移除localStorage存储
            }

            // 更新会员图标状态
            vipIconState.displayMode = document.getElementById('vipIconDisplayMode').value;
            updateVipIconsDisplay();

            // 处理动态图标选择
            const selectedDynamicIcon = document.querySelector('input[name="dynamicIconSelect"]:checked').value;
            // 移除localStorage存储
            updateDynamicIconDisplay(selectedDynamicIcon);

            // 处理VIP图片选择
            const selectedImage = document.querySelector('input[name="imageSelect"]:checked').value;
            // 移除localStorage存储
            // 处理大V图标选择状态
            updateVipBadgesDisplay();

            // 处理靓号图标切换
            const lhIcon = document.getElementById("img19").src;
            // 移除localStorage存储
            applyLhStyle(lhIcon);

            // 处理能量值图标选择
            const selectedEnergyIcon = document.querySelector('input[name="energyIconSelect"]:checked').value;
            updateEnergyIconDisplay(selectedEnergyIcon);

            // 处理等级区域显示状态
            const showBox7 = document.getElementById('showBox7').checked;
            updateBox7Visibility(showBox7);

            // 关闭弹窗
            document.getElementById("editModal").style.display = "none";
        }

        /**
         * 显示选中的VIP图片
         */

        /**
         * 根据等级和样式生成等级图标
         */
        function updateLevelIcons(level, styleNum = "1") {
            const container = document.getElementById("levelIconContainer");
            if (!container) {
                console.error("找不到等级图标容器!");
                return;
            }

            container.innerHTML = ""; // 清空现有图标

            // 计算各类图标数量
            let remainingLevel = level;

            // 皇冠(64级)
            const crownCount = Math.floor(remainingLevel / 64);
            remainingLevel %= 64;

            // 太阳(16级)
            const sunCount = Math.floor(remainingLevel / 16);
            remainingLevel %= 16;

            // 月亮(4级)
            const moonCount = Math.floor(remainingLevel / 4);
            remainingLevel %= 4;

            // 星星(1级)
            const starCount = remainingLevel;

            // 根据选择的样式设置图标后缀
            const styleSuffix = styleNum === "1" ? "" : styleNum;

            // 创建并添加图标
            try {
                for (let i = 0; i < crownCount; i++) {
                    addIcon(container, `./img/crown${styleSuffix}.png`, "皇冠(64)");
                }

                for (let i = 0; i < sunCount; i++) {
                    addIcon(container, `./img/sun${styleSuffix}.png`, "太阳(16)");
                }

                for (let i = 0; i < moonCount; i++) {
                    addIcon(container, `./img/moon${styleSuffix}.png`, "月亮(4)");
                }

                for (let i = 0; i < starCount; i++) {
                    addIcon(container, `./img/star${styleSuffix}.png`, "星星(1)");
                }
            } catch (error) {
                console.error("添加图标时出错:", error);
            }

            // 移除localStorage存储
        }

        /**
         * 创建并添加图标到容器
         */
        function addIcon(container, src, alt) {
            // 创建包装元素来控制间距
            const wrapper = document.createElement("span");
            wrapper.style.marginRight = "0";
            wrapper.style.display = "inline-block";
            wrapper.style.fontSize = "0";

            const img = document.createElement("img");
            img.src = src;
            img.alt = alt;
            img.style.height = "16px";
            img.style.width = "16px";
            img.style.padding = "0";
            img.style.verticalAlign = "middle";
            img.style.display = "inline-block";
            img.style.border = "0";
            img.style.lineHeight = "1";
            img.style.fontSize = "0";
            img.draggable = false;

            // 将图标添加到包装元素中，再将包装元素添加到容器
            wrapper.appendChild(img);
            container.appendChild(wrapper);
        }

        /**
         * 初始化区域显示控制事件
         */
        function initAreaVisibilityEvents() {
            const showBox7Checkbox = document.getElementById('showBox7');
            if (showBox7Checkbox) {
                showBox7Checkbox.addEventListener('change', () => {
                    updateBox7Visibility(showBox7Checkbox.checked);
                });
            }
        }

        /**
         * 更新等级区域显示状态
         */
        function updateBox7Visibility(isVisible) {
            const box7Element = document.querySelector('.box.box7');
            if (box7Element) {
                box7Element.style.display = isVisible ? 'flex' : 'none';
            }
        }

        /**
         * 初始化编辑资料按钮事件
         */
        function initEditProfileButtonEvents() {
            const editProfileButton = document.querySelector(".last button:nth-child(2)");
            if (editProfileButton) {
                editProfileButton.addEventListener('click', () => {
                    window.location.href = 'index2.html';
                });
            }
        }
    </script>

    <!-- 添加靓号图标切换和样式应用函数 -->
    <script>
        /**
         * 切换靓号标识并应用对应号码样式
         */
        function toggleLhIcon() {
            const img = document.getElementById("img19");
            if (!img) return;
            // 判断当前文件名，兼容不同路径或查询参数
            const fileName = img.src.split("/").pop().split("?")[0];
            let next;
            if (fileName === "35.2.png") {
                next = "./img/35.png";   // 切回默认靓标
            } else {
                next = "./img/35.2.png"; // 切换为黑金靓标
            }
            img.src = next;
            // 移除localStorage存储
            applyLhStyle(next);
        }

        /**
         * 根据靓号图标为QQ号码设置样式
         */
        function applyLhStyle(src) {
            const pEle = document.querySelector(".box3 p");
            if (!pEle) return;
            if (src.includes("35.2.png")) {
                // 黑金靓号样式
                pEle.style.height = "15px";
                pEle.style.lineHeight = "15px";
                pEle.style.background = "linear-gradient(to right, #454545, #303030)";
                pEle.style.border = "0";
                pEle.style.color = "#F8D49C";
                pEle.style.fontWeight = "400";
                pEle.style.padding = "0.01rem 0.3rem 0.3rem 0.1rem";
                pEle.style.borderTopRightRadius = "1rem";
                pEle.style.borderBottomRightRadius = "1rem";

                // 同步修改 span 样式
                const spanEle = document.querySelector(".box3 span");
                if (spanEle) {
                    spanEle.style.display = "block";
                    spanEle.style.color = "#c2a77d";
                    spanEle.style.marginLeft = "-0.1px";
                    spanEle.style.fontWeight = "600";
                    spanEle.style.backgroundColor = "#454545";
                    spanEle.style.height = "15px";
                    spanEle.style.fontStyle = "italic";
                    spanEle.style.borderBottomLeftRadius = "1rem";
                    spanEle.style.borderTopLeftRadius = "1rem";
                }
            } else {
                // 恢复默认样式（移除内联覆盖）
                pEle.removeAttribute("style");
                const spanEle = document.querySelector(".box3 span");
                if (spanEle) spanEle.removeAttribute("style");
            }
        }
    </script>
